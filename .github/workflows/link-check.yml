name: Link check

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '41 10 * * 2'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check internal repository links
        run: python scripts/check_internal_links.py
      - name: Audit external links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 3
            --timeout 30
            --accept 200,204,206,403,429
            --exclude-mail
            './**/*.html'
            './**/*.md'
          fail: false
